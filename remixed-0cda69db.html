<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tactile Sensor AR Placement</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
#scene {
  position: relative; width: 100%; height: 100vh;
  overflow: hidden; cursor: grab;
  background-size: cover; background-position: center 55%;
  transition: background-image 0.3s;
}
#scene:active { cursor: grabbing; }
#scene::after {
  content: '';
  position: absolute; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 80% 40% at 50% 105%, rgba(0,0,0,0.40) 0%, transparent 70%),
    linear-gradient(to bottom, rgba(0,0,0,0.14) 0%, transparent 20%, transparent 72%, rgba(0,0,0,0.28) 100%);
}
#c { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

#topbar {
  position: absolute; top: 14px; left: 14px; z-index: 10;
  display: flex; align-items: center; gap: 12px;
  background: rgba(0,0,0,0.48); backdrop-filter: blur(16px);
  border: 0.5px solid rgba(255,255,255,0.13); border-radius: 9px;
  padding: 8px 16px; pointer-events: all;
}
#topbar h1 { font-size: 10px; letter-spacing: 3px; color: rgba(200,215,235,0.92); white-space: nowrap; }
#sc { font-size: 10px; letter-spacing: 2px; color: #3ecf84; }

#panel {
  position: absolute; right: 14px; top: 14px; bottom: 14px; width: 248px;
  background: rgba(0,0,0,0.55); backdrop-filter: blur(20px);
  border: 0.5px solid rgba(255,255,255,0.10); border-radius: 12px;
  overflow-y: auto; overflow-x: hidden; padding: 12px;
  display: flex; flex-direction: column; gap: 9px;
  z-index: 10; pointer-events: all;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}

#ar-hud { position: absolute; inset: 0; pointer-events: none; display: none; z-index: 5; }
.arc { position: absolute; width: 20px; height: 20px; }
.arc-tl { top:13px; left:13px; border-top:1.5px solid #00ff88; border-left:1.5px solid #00ff88; }
.arc-tr { top:13px; right:278px; border-top:1.5px solid #00ff88; border-right:1.5px solid #00ff88; }
.arc-bl { bottom:13px; left:13px; border-bottom:1.5px solid #00ff88; border-left:1.5px solid #00ff88; }
.arc-br { bottom:13px; right:278px; border-bottom:1.5px solid #00ff88; border-right:1.5px solid #00ff88; }
#sl { position:absolute; left:0; right:278px; height:1px; background:rgba(0,255,136,0.3); animation:scan 4s linear infinite; }
@keyframes scan { 0%{top:0%} 100%{top:100%} }
#ht { position:absolute; top:13px; left:50%; transform:translateX(-50%); font-size:9px; color:#00ff88; letter-spacing:3px; white-space:nowrap; }
#hb { position:absolute; bottom:13px; left:13px; display:flex; gap:12px; font-size:8px; color:rgba(0,255,136,0.65); letter-spacing:1px; }
.hbl::before { content:'▸ '; }

#bgpick {
  position: absolute; bottom: 14px; left: 14px;
  display: flex; gap: 6px; z-index: 10; pointer-events: all; align-items: center;
}
.bgt {
  width: 48px; height: 32px; border-radius: 7px; cursor: pointer;
  border: 2px solid rgba(255,255,255,0.18);
  background-size: cover; background-position: center;
  transition: border-color 0.2s, transform 0.15s;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px;
}
.bgt:hover { transform: scale(1.08); border-color: rgba(255,255,255,0.45); }
.bgt.on { border-color: #00ff88; }
.bgt span { font-size: 7px; color: #fff; letter-spacing: 0.5px; text-shadow: 0 1px 4px rgba(0,0,0,1); }

.card { background: rgba(255,255,255,0.05); border: 0.5px solid rgba(255,255,255,0.09); border-radius: 9px; padding: 11px 12px; }
.cl { font-size: 9px; letter-spacing: 2px; color: rgba(120,160,200,0.75); margin-bottom: 8px; }
.row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
.rl { font-size: 10px; color: rgba(160,185,210,0.78); min-width: 60px; }
.rv { font-size: 10px; color: rgba(215,228,245,0.92); min-width: 30px; text-align: right; }
input[type=range] { flex:1; -webkit-appearance:none; height:2px; background:rgba(255,255,255,0.18); border-radius:2px; outline:none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:13px; height:13px; border-radius:50%; background:#4a9fd4; cursor:pointer; border:1.5px solid rgba(255,255,255,0.38); }
input[type=color] { flex:1; height:26px; border:0.5px solid rgba(255,255,255,0.15); border-radius:4px; cursor:pointer; background:transparent; }
.pbs { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:8px; }
.pb { padding:3px 9px; font-size:9px; letter-spacing:1px; border:0.5px solid rgba(255,255,255,0.14); border-radius:5px; cursor:pointer; background:transparent; color:rgba(155,180,210,0.78); }
.pb.on { background:rgba(74,159,212,0.18); border-color:#4a9fd4; color:#90c8f0; }
.slots { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; }
.slot { aspect-ratio:1; border-radius:6px; border:0.5px solid rgba(255,255,255,0.1); display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer; background:rgba(255,255,255,0.03); transition:all .14s; }
.slot:hover { background:rgba(255,255,255,0.07); }
.slot.on { border-color:rgba(62,207,132,0.55); background:rgba(62,207,132,0.09); }
.sdot { width:8px; height:8px; border-radius:50%; background:rgba(255,255,255,0.2); margin-bottom:2px; }
.slot.on .sdot { background:#3ecf84; }
.slot span { font-size:8px; color:rgba(145,168,200,0.55); letter-spacing:1px; }
.slot.on span { color:#3ecf84; }
.sbts { display:flex; gap:4px; }
.sbt { flex:1; padding:4px 2px; text-align:center; font-size:9px; letter-spacing:1px; border:0.5px solid rgba(255,255,255,0.14); border-radius:5px; cursor:pointer; background:transparent; color:rgba(155,180,210,0.78); }
.sbt.on { background:rgba(74,159,212,0.18); border-color:#4a9fd4; color:#90c8f0; }
.abts { display:flex; flex-wrap:wrap; gap:4px; }
.abt { padding:5px 10px; font-size:9px; letter-spacing:1.5px; border:0.5px solid rgba(255,255,255,0.14); border-radius:6px; cursor:pointer; background:transparent; color:rgba(155,180,210,0.78); transition:all .15s; }
.abt:hover { border-color:rgba(255,255,255,0.3); color:rgba(220,235,255,0.95); }
.abt.gon { border-color:rgba(62,207,132,0.55); color:#3ecf84; background:rgba(62,207,132,0.09); }
.abt.oon { border-color:rgba(240,120,60,0.55); color:#f07840; background:rgba(240,120,60,0.09); }

#upload-area {
  position: absolute; bottom: 14px; left: 14px; z-index: 10;
  display: flex; gap: 6px; align-items: flex-end; pointer-events: all;
}
#upload-btn {
  width: 48px; height: 32px; border-radius: 7px; cursor: pointer;
  border: 2px dashed rgba(255,255,255,0.35); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
  transition: border-color 0.2s, transform 0.15s; background: rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
}
#upload-btn:hover { border-color: rgba(255,255,255,0.7); transform: scale(1.06); }
#upload-btn.has-photo { border-style: solid; border-color: #00ff88; }
#photo-input { display: none; }
#user-thumb {
  width: 48px; height: 32px; border-radius: 7px; cursor: pointer;
  border: 2px solid #00ff88; background-size: cover; background-position: center;
  display: none; transition: transform 0.15s;
}
#user-thumb:hover { transform: scale(1.08); }
#user-thumb.on { border-color: #00ff88; }
.bgt.on { border-color: #00ff88; }
.bgt { border: 2px solid rgba(255,255,255,0.18); }
</style>
</head>
<body>
<div id="scene">
  <canvas id="c"></canvas>
  <div id="ar-hud">
    <div class="arc arc-tl"></div><div class="arc arc-tr"></div>
    <div class="arc arc-bl"></div><div class="arc arc-br"></div>
    <div id="sl"></div>
    <div id="ht">TACTILE SENSOR ARRAY — AR PLACEMENT</div>
    <div id="hb">
      <span class="hbl" id="hb-s">SENSORS: 0</span>
      <span class="hbl">RES: 5×5mm</span>
      <span class="hbl">FREQ: 100Hz</span>
      <span class="hbl" id="hb-c">COV: 0%</span>
    </div>
  </div>
  <div id="topbar">
    <h1>TACTILE SENSOR PLACEMENT</h1>
    <span id="sc">0 SENSORS ACTIVE</span>
  </div>
  <div id="upload-area">
    <div id="bgpick"></div>
    <label id="upload-btn" title="Upload your own photo" for="photo-input">
      <input type="file" id="photo-input" accept="image/*">
      <svg width="14" height="12" viewBox="0 0 24 20" fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 13v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 6 12 1 7 6"/><line x1="12" y1="1" x2="12" y2="13"/></svg>
      <span style="font-size:7px;color:rgba(255,255,255,0.65);letter-spacing:0.5px;font-family:'Courier New',monospace;margin-top:1px;">PHOTO</span>
    </label>
    <div id="user-thumb" title="Your photo (click to remove)"></div>
  </div>
  <div id="panel">
    <div class="card">
      <div class="abts">
        <button class="abt" id="ar-btn">AR MODE</button>
        <button class="abt" id="sim-btn">PRESSURE SIM</button>
        <button class="abt" id="rst-btn">RESET</button>
      </div>
    </div>
    <div class="card">
      <div class="cl">BOTTLE MATERIAL</div>
      <div class="pbs">
        <button class="pb on" data-p="plastic">Plastic</button>
        <button class="pb" data-p="glass">Glass</button>
        <button class="pb" data-p="frosted">Frosted</button>
        <button class="pb" data-p="metal">Metal</button>
        <button class="pb" data-p="rubber">Rubber</button>
      </div>
      <div class="row"><span class="rl">Color</span><input type="color" id="b-col" value="#2a7ab8"></div>
      <div class="row"><span class="rl">Opacity</span><input type="range" id="b-op" min="0.05" max="1" step="0.01" value="1"><span class="rv" id="b-op-v">100%</span></div>
      <div class="row"><span class="rl">Roughness</span><input type="range" id="b-ro" min="0" max="1" step="0.01" value="0.35"><span class="rv" id="b-ro-v">0.35</span></div>
      <div class="row"><span class="rl">Metalness</span><input type="range" id="b-me" min="0" max="1" step="0.01" value="0"><span class="rv" id="b-me-v">0.00</span></div>
    </div>
    <div class="card">
      <div class="cl">SENSOR SLOTS</div>
      <div style="display:flex;justify-content:space-between;font-size:8px;color:rgba(100,135,170,0.5);margin-bottom:5px;letter-spacing:1px;"><span>LOWER RING</span><span>UPPER RING</span></div>
      <div class="slots" id="slots"></div>
    </div>
    <div class="card">
      <div class="cl">SENSOR PROPERTIES</div>
      <div class="row"><span class="rl">Color</span><input type="color" id="s-col" value="#e84040"></div>
      <div class="row"><span class="rl">Width</span><input type="range" id="s-w" min="0.06" max="0.30" step="0.01" value="0.15"><span class="rv" id="s-w-v">19mm</span></div>
      <div class="row"><span class="rl">Height</span><input type="range" id="s-h" min="0.08" max="0.38" step="0.01" value="0.20"><span class="rv" id="s-h-v">25mm</span></div>
      <div class="row"><span class="rl">Opacity</span><input type="range" id="s-op" min="0.2" max="1" step="0.01" value="0.88"><span class="rv" id="s-op-v">88%</span></div>
      <div class="cl" style="margin-top:6px;">SHAPE</div>
      <div class="sbts">
        <button class="sbt on" data-sh="rect">Rect</button>
        <button class="sbt" data-sh="round">Round</button>
        <button class="sbt" data-sh="hex">Hex</button>
        <button class="sbt" data-sh="cross">Cross</button>
      </div>
    </div>
  </div>
</div>

const SCENES = [
  { key:'wood',     label:'Oak',     ambC:0xffe0a8, ambI:0.55, keyC:0xfff4e0 },
  { key:'marble',   label:'Marble',  ambC:0xf0f4ff, ambI:0.75, keyC:0xffffff },
  { key:'lab',      label:'Lab',     ambC:0xe0ecf8, ambI:0.62, keyC:0xf0f8ff },
  { key:'dark',     label:'Walnut',  ambC:0x182030, ambI:0.30, keyC:0x88b0d0 },
  { key:'concrete', label:'Slab',    ambC:0xd8d4cc, ambI:0.55, keyC:0xf0ece8 },
];

const sceneEl = document.getElementById('scene');
const bgpick  = document.getElementById('bgpick');

// Set initial background
sceneEl.style.backgroundImage = `url(${TEX.wood})`;

SCENES.forEach((s, i) => {
  const d = document.createElement('div');
  d.className = 'bgt' + (i===0?' on':'');
  d.style.backgroundImage = `url(${TEX[s.key]})`;
  d.innerHTML = `<span>${s.label}</span>`;
  d.onclick = () => {
    sceneEl.style.backgroundImage = `url(${TEX[s.key]})`;
    amb.color.set(s.ambC); amb.intensity = s.ambI;
    key.color.set(s.keyC);
    document.querySelectorAll('.bgt').forEach((el,j) => el.classList.toggle('on', j===i));
  };
  bgpick.appendChild(d);
});
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias:true, alpha:true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputEncoding = THREE.sRGBEncoding;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
renderer.setClearColor(0x000000, 0);

const S = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(44, 1, 0.1, 50);
camera.position.set(0, 1.1, 5.2);
camera.lookAt(0, -0.15, 0);

function resize() {
  const w=sceneEl.clientWidth, h=sceneEl.clientHeight;
  renderer.setSize(w,h); camera.aspect=w/h; camera.updateProjectionMatrix();
}
resize(); window.addEventListener('resize', resize);

const amb = new THREE.AmbientLight(0xffe0a8, 0.55); S.add(amb);
const key = new THREE.DirectionalLight(0xfff4e0, 0.88);
key.position.set(3,6,4); key.castShadow=true;
key.shadow.mapSize.set(2048,2048);
key.shadow.camera.left=-4; key.shadow.camera.right=4;
key.shadow.camera.top=6; key.shadow.camera.bottom=-2;
key.shadow.bias=-0.001; S.add(key);
const fill=new THREE.DirectionalLight(0xc0d8ff,0.25); fill.position.set(-3,2,3); S.add(fill);
const bot=new THREE.DirectionalLight(0xffeedd,0.12); bot.position.set(0,-3,2); S.add(bot);

const shadowGround=new THREE.Mesh(new THREE.PlaneGeometry(14,14),new THREE.ShadowMaterial({opacity:0.28,transparent:true}));
shadowGround.rotation.x=-Math.PI/2; shadowGround.position.y=-1.62; shadowGround.receiveShadow=true; S.add(shadowGround);

const BP=[[0.02,0],[0.22,0.04],[0.38,0.10],[0.44,0.24],[0.44,0.48],[0.42,0.60],[0.20,0.72],[0.15,0.82],[0.17,0.88],[0.17,1.00]];
const BH=3.2,BR=0.90;
function bR(t){t=Math.max(0,Math.min(1,t));for(let i=1;i<BP.length;i++)if(t<=BP[i][1]){const[r0,t0]=BP[i-1],[r1,t1]=BP[i];return(r0+(t-t0)/(t1-t0)*(r1-r0))*BR;}return BP[BP.length-1][0]*BR;}
const bPts=BP.map(([r,t])=>new THREE.Vector2(r*BR,t*BH-BH/2));
const bottleGeo=new THREE.LatheGeometry(bPts,80);
const bottleMat=new THREE.MeshStandardMaterial({color:0x2a7ab8,roughness:0.35,metalness:0.05,transparent:false,opacity:1});
const group=new THREE.Group(); S.add(group);
const bMesh=new THREE.Mesh(bottleGeo,bottleMat);
bMesh.castShadow=true; bMesh.receiveShadow=true; group.add(bMesh);

const sc={color:'#e84040',w:0.15,h:0.20,opacity:0.88,shape:'rect'};
const ANGS=[0,Math.PI/2,Math.PI,3*Math.PI/2],ALB=['F','R','B','L'];
const RINGS=[{t:0.33,l:'L'},{t:0.53,l:'U'}];
const slots=[];
for(let ri=0;ri<2;ri++)for(let ai=0;ai<4;ai++)slots.push({t:RINGS[ri].t,angle:ANGS[ai],lbl:RINGS[ri].l+ALB[ai],on:false,mesh:null,ph:Math.random()*Math.PI*2});

function makeSG(sw,sh){const{shape}=sc;if(shape==='rect')return new THREE.PlaneGeometry(sw,sh);if(shape==='round')return new THREE.CircleGeometry(Math.min(sw,sh)/2,40);if(shape==='hex'){const s=new THREE.Shape(),r=Math.min(sw,sh)/2;for(let i=0;i<6;i++){const a=(Math.PI/3)*i-Math.PI/6;i?s.lineTo(r*Math.cos(a),r*Math.sin(a)):s.moveTo(r*Math.cos(a),r*Math.sin(a));}s.closePath();return new THREE.ShapeGeometry(s);}if(shape==='cross'){const s=new THREE.Shape(),t=sw*0.38;s.moveTo(-t,-sh/2);s.lineTo(t,-sh/2);s.lineTo(t,-t);s.lineTo(sw/2,-t);s.lineTo(sw/2,t);s.lineTo(t,t);s.lineTo(t,sh/2);s.lineTo(-t,sh/2);s.lineTo(-t,t);s.lineTo(-sw/2,t);s.lineTo(-sw/2,-t);s.lineTo(-t,-t);s.closePath();return new THREE.ShapeGeometry(s);}return new THREE.PlaneGeometry(sw,sh);}

function placeSensor(slot){const geo=makeSG(sc.w,sc.h);const mat=new THREE.MeshStandardMaterial({color:new THREE.Color(sc.color),roughness:0.4,metalness:0.3,transparent:true,opacity:sc.opacity,side:THREE.DoubleSide,emissive:new THREE.Color(sc.color),emissiveIntensity:0.12});const mesh=new THREE.Mesh(geo,mat);const r=bR(slot.t)+0.024,y=slot.t*BH-BH/2;mesh.position.set(r*Math.cos(slot.angle),y,r*Math.sin(slot.angle));mesh.lookAt(r*Math.cos(slot.angle)*2,y,r*Math.sin(slot.angle)*2);mesh.castShadow=true;mesh.add(new THREE.LineSegments(new THREE.EdgesGeometry(geo),new THREE.LineBasicMaterial({color:0xffffff,transparent:true,opacity:0.38})));const dg=new THREE.CircleGeometry(0.012,8),dm=new THREE.MeshBasicMaterial({color:0xffffff,transparent:true,opacity:0.6});[[sc.w/2-0.024,sc.h/2-0.024],[-(sc.w/2-0.024),sc.h/2-0.024],[sc.w/2-0.024,-(sc.h/2-0.024)],[-(sc.w/2-0.024),-(sc.h/2-0.024)]].forEach(([ox,oy])=>{const d=new THREE.Mesh(dg,dm);d.position.set(ox,oy,0.001);mesh.add(d);});group.add(mesh);return mesh;}

function toggleSlot(i){const s=slots[i];s.on=!s.on;if(s.on){s.mesh=placeSensor(s);}else if(s.mesh){group.remove(s.mesh);s.mesh.geometry.dispose();s.mesh.material.dispose();s.mesh=null;}renderSlots();updateHUD();}
function rebuildAll(){slots.forEach(s=>{if(s.on&&s.mesh){group.remove(s.mesh);s.mesh.geometry.dispose();s.mesh.material.dispose();s.mesh=placeSensor(s);}});}
function renderSlots(){const el=document.getElementById('slots');el.innerHTML='';slots.forEach((s,i)=>{const d=document.createElement('div');d.className='slot'+(s.on?' on':'');d.innerHTML=`<div class="sdot"></div><span>${s.lbl}</span>`;d.onclick=()=>toggleSlot(i);el.appendChild(d);});const n=slots.filter(s=>s.on).length;document.getElementById('sc').textContent=n+' SENSOR'+(n!==1?'S':'')+' ACTIVE';}
renderSlots();
function updateHUD(){const n=slots.filter(s=>s.on).length;document.getElementById('hb-s').textContent='SENSORS: '+n;document.getElementById('hb-c').textContent='COV: '+Math.round(n*12.5)+'%';}

const presets={plastic:{r:0.35,m:0.05,op:1,tr:false},glass:{r:0.04,m:0,op:0.20,tr:true},frosted:{r:0.90,m:0,op:0.55,tr:true},metal:{r:0.15,m:0.92,op:1,tr:false},rubber:{r:0.96,m:0,op:1,tr:false}};
document.querySelectorAll('.pb').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.pb').forEach(b=>b.classList.remove('on'));btn.classList.add('on');const p=presets[btn.dataset.p];bottleMat.roughness=p.r;bottleMat.metalness=p.m;bottleMat.opacity=p.op;bottleMat.transparent=p.tr;bottleMat.needsUpdate=true;document.getElementById('b-op').value=p.op;document.getElementById('b-op-v').textContent=Math.round(p.op*100)+'%';document.getElementById('b-ro').value=p.r;document.getElementById('b-ro-v').textContent=p.r.toFixed(2);document.getElementById('b-me').value=p.m;document.getElementById('b-me-v').textContent=p.m.toFixed(2);});
document.getElementById('b-col').oninput=e=>bottleMat.color.set(e.target.value);
document.getElementById('b-op').oninput=e=>{const v=parseFloat(e.target.value);bottleMat.opacity=v;bottleMat.transparent=v<1;bottleMat.needsUpdate=true;document.getElementById('b-op-v').textContent=Math.round(v*100)+'%';};
document.getElementById('b-ro').oninput=e=>{bottleMat.roughness=parseFloat(e.target.value);document.getElementById('b-ro-v').textContent=parseFloat(e.target.value).toFixed(2);};
document.getElementById('b-me').oninput=e=>{bottleMat.metalness=parseFloat(e.target.value);document.getElementById('b-me-v').textContent=parseFloat(e.target.value).toFixed(2);};
document.getElementById('s-col').oninput=e=>{sc.color=e.target.value;rebuildAll();};
document.getElementById('s-w').oninput=e=>{sc.w=parseFloat(e.target.value);document.getElementById('s-w-v').textContent=Math.round(sc.w*125)+'mm';rebuildAll();};
document.getElementById('s-h').oninput=e=>{sc.h=parseFloat(e.target.value);document.getElementById('s-h-v').textContent=Math.round(sc.h*125)+'mm';rebuildAll();};
document.getElementById('s-op').oninput=e=>{sc.opacity=parseFloat(e.target.value);document.getElementById('s-op-v').textContent=Math.round(sc.opacity*100)+'%';rebuildAll();};
document.querySelectorAll('.sbt').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.sbt').forEach(b=>b.classList.remove('on'));btn.classList.add('on');sc.shape=btn.dataset.sh;rebuildAll();});

let arMode=false,simMode=false;
document.getElementById('ar-btn').onclick=()=>{arMode=!arMode;document.getElementById('ar-hud').style.display=arMode?'block':'none';document.getElementById('ar-btn').classList.toggle('gon',arMode);updateHUD();};
document.getElementById('sim-btn').onclick=()=>{simMode=!simMode;document.getElementById('sim-btn').classList.toggle('oon',simMode);};
document.getElementById('rst-btn').onclick=()=>{slots.map((s,i)=>s.on?i:null).filter(i=>i!==null).forEach(i=>toggleSlot(i));};

let drag=false,pm={x:0,y:0},autoRot=true,aTimer;
canvas.addEventListener('mousedown',e=>{drag=true;pm={x:e.clientX,y:e.clientY};autoRot=false;clearTimeout(aTimer);});
window.addEventListener('mouseup',()=>{drag=false;aTimer=setTimeout(()=>autoRot=true,3000);});
window.addEventListener('mousemove',e=>{if(!drag)return;group.rotation.y+=(e.clientX-pm.x)*0.012;group.rotation.x=Math.max(-0.5,Math.min(0.5,group.rotation.x+(e.clientY-pm.y)*0.006));pm={x:e.clientX,y:e.clientY};});
canvas.addEventListener('touchstart',e=>{drag=true;const t=e.touches[0];pm={x:t.clientX,y:t.clientY};autoRot=false;},{passive:true});
window.addEventListener('touchend',()=>{drag=false;aTimer=setTimeout(()=>autoRot=true,3000);});
window.addEventListener('touchmove',e=>{if(!drag)return;const t=e.touches[0];group.rotation.y+=(t.clientX-pm.x)*0.012;pm={x:t.clientX,y:t.clientY};},{passive:true});

const clock=new THREE.Clock();
const HOT=new THREE.Color(0xff3300);
function animate(){
  requestAnimationFrame(animate);
  if(autoRot)group.rotation.y+=0.005;
  const t=clock.getElapsedTime();
  slots.forEach(s=>{if(s.on&&s.mesh){if(simMode){const v=Math.sin(t*1.6+s.ph)*0.5+0.5;s.mesh.material.color.lerpColors(new THREE.Color(sc.color),HOT,v);s.mesh.material.emissive.lerpColors(new THREE.Color(0),HOT,v*0.5);s.mesh.material.emissiveIntensity=v*0.5;}else{s.mesh.material.color.set(sc.color);s.mesh.material.emissive.set(sc.color);s.mesh.material.emissiveIntensity=0.12;}}}); 
  renderer.render(S,camera);
}
animate();


// ── Photo upload ──────────────────────────────────────────────────────────────
const photoInput  = document.getElementById('photo-input');
const uploadBtn   = document.getElementById('upload-btn');
const userThumb   = document.getElementById('user-thumb');
let userPhotoURL  = null;

photoInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = evt => {
    userPhotoURL = evt.target.result;
    // Set as background
    sceneEl.style.backgroundImage = `url(${userPhotoURL})`;
    // Show thumbnail
    userThumb.style.backgroundImage = `url(${userPhotoURL})`;
    userThumb.style.display = 'block';
    userThumb.classList.add('on');
    uploadBtn.classList.add('has-photo');
    // Deselect preset thumbs
    document.querySelectorAll('.bgt').forEach(b => b.classList.remove('on'));
    // Auto-adjust lighting to neutral
    amb.color.set(0xfff0e8); amb.intensity = 0.58;
    key.color.set(0xfff8f0);
  };
  reader.readAsDataURL(file);
  e.target.value = ''; // allow re-selecting same file
});

// Click user thumb to remove it
userThumb.addEventListener('click', () => {
  userPhotoURL = null;
  userThumb.style.display = 'none';
  userThumb.classList.remove('on');
  uploadBtn.classList.remove('has-photo');
  // Restore first preset
  const first = SCENES[0];
  sceneEl.style.backgroundImage = `url(${TEX[first.key]})`;
  amb.color.set(first.ambC); amb.intensity = first.ambI; key.color.set(first.keyC);
  document.querySelectorAll('.bgt').forEach((b,i) => b.classList.toggle('on', i===0));
});

// Drag-and-drop anywhere on scene
sceneEl.addEventListener('dragover', e => { e.preventDefault(); sceneEl.style.outline = '3px dashed rgba(0,255,136,0.5)'; });
sceneEl.addEventListener('dragleave', () => { sceneEl.style.outline = 'none'; });
sceneEl.addEventListener('drop', e => {
  e.preventDefault();
  sceneEl.style.outline = 'none';
  const file = e.dataTransfer.files[0];
  if (!file || !file.type.startsWith('image/')) return;
  const reader = new FileReader();
  reader.onload = evt => {
    userPhotoURL = evt.target.result;
    sceneEl.style.backgroundImage = `url(${userPhotoURL})`;
    userThumb.style.backgroundImage = `url(${userPhotoURL})`;
    userThumb.style.display = 'block';
    userThumb.classList.add('on');
    uploadBtn.classList.add('has-photo');
    document.querySelectorAll('.bgt').forEach(b => b.classList.remove('on'));
    amb.color.set(0xfff0e8); amb.intensity = 0.58; key.color.set(0xfff8f0);
  };
  reader.readAsDataURL(file);
});
</script>
</body>
</html>
